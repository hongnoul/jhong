<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <script src="/favicon.js"></script>
  <title>Voronoi Space-Value Model — Justin Hong</title>
</head>
<body>
<div class="post-page" style="padding: 0; max-width: 860px;">
    <div id="pdf-pages"></div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const container = document.getElementById('pdf-pages');

    pdfjsLib.getDocument('/papers/voronoi-space-value.pdf').promise.then(async pdf => {
      for (let n = 1; n <= pdf.numPages; n++) {
        const page = await pdf.getPage(n);
        const base = page.getViewport({ scale: 1 });
        const dpr = window.devicePixelRatio || 1;
        const scale = (container.clientWidth / base.width) * dpr;
        const vp = page.getViewport({ scale });

        const canvas = document.createElement('canvas');
        canvas.width  = vp.width;
        canvas.height = vp.height;
        canvas.style.width  = (vp.width  / dpr) + 'px';
        canvas.style.height = (vp.height / dpr) + 'px';
        canvas.className = 'pdf-page';
        container.appendChild(canvas);

        await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
      }
    });
  </script>
</body>
</html>
